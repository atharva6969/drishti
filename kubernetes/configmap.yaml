---
apiVersion: v1
kind: Namespace
metadata:
  name: drishti
  labels:
    name: drishti
    environment: production
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: drishti-config
  namespace: drishti
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  ALLOWED_ORIGINS: "https://drishti.police.gov.in"
  POSTGRES_DB: "drishti"
  POSTGRES_USER: "drishti"
  JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "60"
  JWT_REFRESH_TOKEN_EXPIRE_DAYS: "7"
  MAX_FILE_UPLOAD_MB: "10"
  FACE_RECOGNITION_THRESHOLD: "0.6"
  GAIT_RECOGNITION_THRESHOLD: "0.75"
  CLOTHING_DETECTION_THRESHOLD: "0.7"
  ROUTE_ALERT_RADIUS_KM: "50"
