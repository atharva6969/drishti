---
# IMPORTANT: In production, use sealed-secrets or Vault to manage these.
# This is a template — never commit real credentials.
apiVersion: v1
kind: Secret
metadata:
  name: drishti-secrets
  namespace: drishti
type: Opaque
stringData:
  SECRET_KEY: "REPLACE_WITH_LONG_RANDOM_SECRET"
  DATABASE_URL: "postgresql+asyncpg://drishti:REPLACE_PASSWORD@postgres-service:5432/drishti"
  REDIS_URL: "redis://:REPLACE_PASSWORD@redis-service:6379/0"
  TWILIO_ACCOUNT_SID: "REPLACE_TWILIO_SID"
  TWILIO_AUTH_TOKEN: "REPLACE_TWILIO_TOKEN"
  TWILIO_WHATSAPP_NUMBER: "whatsapp:+REPLACE_NUMBER"
  POSTGRES_PASSWORD: "REPLACE_PASSWORD"
  REDIS_PASSWORD: "REPLACE_PASSWORD"
  AWS_ACCESS_KEY_ID: "REPLACE_AWS_KEY"
  AWS_SECRET_ACCESS_KEY: "REPLACE_AWS_SECRET"
  AWS_S3_BUCKET: "drishti-evidence"
